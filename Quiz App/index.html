<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App Using Typescript</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <!-- Header  -->
    <header class="navbar sticky-top bg-body-tertiary">
      <div class="container-fluid text-center justify-content-center">
        <a class="navbar-brand" href="#">Welcome To Quiz Game</a>
      </div>
    </header>
    <!-- Header  -->

    <!-- Page Body -->
    <main class="px-5 flex align-items-center generalInfoWrapper">
      <div class="card text-center">
        <div class="card-header">General Informations</div>
        <div class="card-body">
          <form class="info-form">
            <div class="mb-3 inputWrapper">
              <label for="username" class="form-label">Enter Your Name</label>
              <input
                type="type"
                class="form-control"
                id="username"
                name="username"
              />
            </div>
            <div class="mb-3 inputWrapper">
              <label for="questions_number" class="form-label"
                >Choose Total Questions</label
              >
              <input
                type="number"
                class="form-control"
                id="questions_number"
                name="questions_number"
              />
            </div>
            <button type="submit" class="btn btn-primary submit-button">
              Start The Quiz
            </button>
          </form>
        </div>
        <!-- <div class="card-footer text-body-secondary">2 days ago</div> -->
      </div>
    </main>
    <!-- Page Body -->

    <!-- Footer -->
    <footer class="navbar bg-body-tertiary">
      <div class="container-fluid justify-content-center">
        <span class="navbar-text"> Footer Text </span>
      </div>
    </footer>
    <!-- Footer -->

    <!-- Scripts Used -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./dist/index.js"></script>
  </body>
</html>
